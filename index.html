<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

    <!-- ====== SEO & App Meta ====== -->
    <title>CargoExpress PH — Cargo Delivery Booking &amp; Tracking</title>
    <meta name="description" content="CargoExpress PH - Web-Based Cargo Delivery Booking and Tracking System. Track shipments, manage deliveries, and streamline your logistics operations across the Philippines." />
    <meta name="keywords" content="cargo, delivery, booking, tracking, logistics, Philippines, shipping, freight, CargoExpress" />
    <meta name="author" content="CargoExpress PH" />
    <meta name="application-name" content="CargoExpress PH" />

    <!-- ====== Theme & Colors ====== -->
    <meta name="theme-color" content="#E8722A" />
    <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#E8722A" />
    <meta name="msapplication-navbutton-color" content="#E8722A" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('cargoexpress_theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = storedTheme === 'dark' || storedTheme === 'light'
            ? storedTheme
            : prefersDark ? 'dark' : 'light';

          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>

    <!-- ====== PWA Manifest ====== -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />

    <!-- ====== Favicon & Icons ====== -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-72.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ====== Service Worker Registration ====== -->
    <script>
      if ('serviceWorker' in navigator) {
        // Skip SW registration in development to avoid intercepting Vite dev server
        const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isDev) {
          // In dev mode, unregister any existing SW to prevent stale cache issues
          navigator.serviceWorker.getRegistrations().then(registrations => {
            registrations.forEach(r => r.unregister());
          });
        } else {
          window.addEventListener('load', async () => {
            try {
              const registration = await navigator.serviceWorker.register('/sw.js', {
                scope: '/',
              });

              // Check for updates periodically (every 60 minutes)
              setInterval(() => {
                registration.update();
              }, 60 * 60 * 1000);

              // Handle updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;

                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Dispatch custom event for the app to show update UI
                    window.dispatchEvent(new CustomEvent('sw-update-available', {
                      detail: { registration }
                    }));
                  }
                });
              });
            } catch (error) {
              // SW registration failed — app continues working without offline support
            }
          });

          // Handle controller change (new SW activated)
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            // New SW activated — page will use latest assets on next navigation
          });
        }
      }
    </script>
  </body>
</html>
