<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8722A"/>
      <stop offset="100%" style="stop-color:#D4631F"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>
  <!-- Inner subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- Cargo box body -->
  <g filter="url(#shadow)">
    <!-- Main box shape (3D isometric-inspired) -->
    <path d="M256 100 L400 175 L400 340 L256 415 L112 340 L112 175 Z" 
          fill="#1B3A5C" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Top face -->
    <path d="M256 100 L400 175 L256 250 L112 175 Z" 
          fill="#234B73" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Right face -->
    <path d="M256 250 L400 175 L400 340 L256 415 Z" 
          fill="#1B3A5C"/>
    <!-- Left face (lighter) -->
    <path d="M256 250 L112 175 L112 340 L256 415 Z" 
          fill="#1F4268"/>
    <!-- Horizontal tape line -->
    <line x1="112" y1="257" x2="256" y2="332" stroke="#E8722A" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <line x1="256" y1="332" x2="400" y2="257" stroke="#E8722A" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <!-- Vertical tape on top -->
    <line x1="256" y1="100" x2="256" y2="250" stroke="#E8722A" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <!-- Vertical tape on front -->
    <line x1="256" y1="250" x2="256" y2="415" stroke="#E8722A" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  </g>
  <!-- Speed/motion lines (express delivery) -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round">
    <line x1="68" y1="200" x2="95" y2="200"/>
    <line x1="55" y1="240" x2="90" y2="240"/>
    <line x1="68" y1="280" x2="95" y2="280"/>
  </g>
  <!-- Small upward arrow indicating delivery/shipping -->
  <g transform="translate(370, 120)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="28" x2="12" y2="4"/>
    <polyline points="4,12 12,4 20,12"/>
  </g>
</svg>